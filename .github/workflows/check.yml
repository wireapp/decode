name: decode tool

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}-check-decode-tool"

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    if: github.repository == 'wireapp/decode'

    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            target-triple: x86_64-unknown-linux-gnu
          - runs-on: macos-latest
            target-triple: aarch64-apple-darwin
          - runs-on: windows-latest
            target-triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6

      - name: check
        run: |
          cargo check --release --target ${{ matrix.target-triple }}
